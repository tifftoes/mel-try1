<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign in — MelGuide</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--panel); }
    .card { max-width:760px; width:100%; padding:32px; background:#fff; border:1px solid #e6e2db; box-shadow:0 6px 24px rgba(15,25,35,0.06); text-align:center; }
    .btn { display:inline-block; padding:12px 18px; background:#ff3b4a; color:#fff; border-radius:6px; text-decoration:none; font-weight:700; }
    .meta { color:#6b7280; margin-bottom:18px; }
  </style>
</head>
<body>
  <div class="card">
    <h1 style="margin-bottom:8px">Sign in to view the MelGuide</h1>
    <div class="meta">Please sign in with Patreon to continue.</div>
    <a class="btn" href="/auth/patreon">Login with Patreon</a>
    <div style="margin-top:18px;color:#9ca3af;font-size:0.9rem">After signing in you'll be redirected to the guide.</div>
  </div>
</body>
</html>
